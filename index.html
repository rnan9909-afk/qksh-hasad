<!DOCTYPE html>
<html dir="rtl" lang="ar">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>نظام سجل الاختبارات — الدخول</title>

  <!-- PWA: الأيقونة والتثبيت -->
  <link rel="icon" type="image/png" sizes="32x32" href="assets/images/favicon-32.png" />
  <link rel="apple-touch-icon" href="assets/images/apple-touch-icon.png" />
  <link rel="manifest" href="manifest.webmanifest" />
  <meta name="theme-color" content="#1E4D2B" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="حصاد" />

  <!-- الخطوط والأيقونات -->
  <link href="https://fonts.googleapis.com" rel="preconnect" />
  <link crossorigin href="https://fonts.gstatic.com" rel="preconnect" />
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@200..1000&family=Almarai:wght@300;400;700;800&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />

  <!-- الأنماط -->
  <link rel="stylesheet" href="assets/css/main.css" />
  <link rel="stylesheet" href="assets/css/login.css" />

  <!-- SweetAlert2 -->
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>

<body>
  <div class="login-shell">
    <div class="absolute inset-0 bg-islamic-pattern" style="position:absolute;inset:0;z-index:0;pointer-events:none;"></div>

    <div style="position:relative;z-index:10;width:100%;max-width:520px;padding:2rem 1rem;display:flex;flex-direction:column;align-items:center;gap:2rem;">
      <!-- الترويسة -->
      <div style="display:flex;flex-direction:column;align-items:center;text-align:center;gap:1rem;">
        <div class="login-logo">
          <img id="brandLogo" src="" alt="الشعار" style="width:100%;height:100%;object-fit:contain;" />
        </div>
        <div>
          <h1 style="font-size:2.2rem;font-weight:800;color:#1e293b;margin:0;" id="brandTitle">نظام سجل الاختبارات</h1>
        </div>
      </div>

      <!-- بطاقة الدخول برقم الهوية -->
      <div class="login-card">
        <h3 style="font-size:1.1rem;font-weight:700;color:var(--primary);display:flex;align-items:center;gap:.5rem;margin:0 0 1.5rem;">
          <span class="material-symbols-outlined">badge</span> الدخول برقم الهوية
        </h3>
        <div style="display:flex;flex-direction:column;gap:1rem;">
          <label style="display:flex;flex-direction:column;gap:.5rem;">
            <span style="color:#334155;font-weight:600;font-size:.875rem;">رقم الهوية / السجل المدني</span>
            <input id="nationalIdInput" type="text" inputmode="numeric" maxlength="10" class="login-id-input"
              placeholder="10xxxxxxxx" autocomplete="off" />
          </label>
          <button id="loginBtn" class="btn-primary" style="width:100%;height:3.25rem;font-size:1.05rem;display:flex;align-items:center;justify-content:center;gap:.5rem;">
            دخول <span class="material-symbols-outlined" style="transform:rotate(180deg);">login</span>
          </button>
        </div>
      </div>
    </div>
  </div>

  <script type="module" src="assets/js/views/login.view.js"></script>
  <script src="assets/js/pwa.js"></script>
</body>

</html>
